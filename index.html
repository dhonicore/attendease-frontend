<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendEase | Master Your Presence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
--bg:#111320;
--card-bg:#1B1E2F;
--peach:#FFA586;
--crimson:#B51A2B;
--safe:#4ADE80;
--danger:#EF4444;
--text-main:#FFFFFF;
--text-dim:#94A3B8;
--border:rgba(255,165,134,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:var(--text-main);
font-family:'Barlow',sans-serif;
line-height:1.5;
}

h1,h2,h3,.condensed{
font-family:'Barlow Condensed',sans-serif;
font-weight:900;
text-transform:uppercase;
}

/* AUTH */
#auth-screen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top right,#1b1e2f,#111320);
}

.auth-card{
background:var(--card-bg);
padding:3rem;
border-radius:24px;
text-align:center;
border:1px solid var(--border);
max-width:400px;
width:90%;
}

.logo-large{font-size:3rem;color:var(--peach)}

.google-btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
background:white;
color:black;
text-decoration:none;
padding:12px 24px;
border-radius:12px;
font-weight:600;
margin-top:2rem;
}

/* DASHBOARD */
#dashboard{display:none}

nav{
position:sticky;
top:0;
background:rgba(17,19,32,0.9);
border-bottom:1px solid var(--border);
padding:1rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links{display:flex;gap:2rem}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:.9rem}
.nav-links a.active{color:var(--peach)}

.nav-profile{display:flex;gap:12px;align-items:center}
#nav-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--peach)}

main{padding:2rem 5%;max-width:1400px;margin:auto}

.grid-layout{
display:grid;
grid-template-columns:1fr 350px;
gap:2rem;
}

/* METRICS */
.metrics-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:1.5rem;
margin-bottom:2rem;
}

.m-card{
background:var(--card-bg);
padding:1.5rem;
border-radius:16px;
border-left:4px solid var(--peach);
}

.value{font-size:2.2rem}

/* CARD */
.card{
background:var(--card-bg);
border-radius:20px;
padding:1.5rem;
margin-bottom:1.5rem;
border:1px solid var(--border);
}

/* SUBJECT */
.subject-item{
background:rgba(255,255,255,0.03);
padding:1rem;
border-radius:12px;
margin-bottom:1rem;
}

.progress-container{
height:8px;
background:#2D314D;
border-radius:4px;
margin:10px 0;
overflow:hidden;
}

.progress-bar{height:100%;background:var(--peach)}

.badge{
padding:2px 8px;
border-radius:4px;
font-size:.7rem;
font-weight:bold;
}

.badge-safe{background:var(--safe);color:black}
.badge-warn{background:var(--peach);color:black}
.badge-danger{background:var(--crimson);color:white}

/* BUTTONS */
.class-btn-group{display:flex;gap:10px;margin-top:10px}

.btn-p{
background:var(--peach);
border:none;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
flex:1;
}

.btn-a{
background:transparent;
border:1px solid var(--crimson);
color:var(--crimson);
padding:8px 16px;
border-radius:8px;
cursor:pointer;
flex:1;
}
</style>
</head>

<body>

<section id="auth-screen">
<div class="auth-card">
<h1 class="logo-large">AttendEase</h1>
<p style="color:var(--text-dim)">Master your presence. Predict your freedom.</p>

<a href="https://attendease-backend-wrag.onrender.com/auth/google" class="google-btn">
<img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
Continue with Google
</a>

</div>
</section>

<div id="dashboard">

<nav>
<h2 style="color:var(--peach)">AttendEase</h2>

<div class="nav-links">
<a class="active">Dashboard</a>
<a>Subjects</a>
</div>

<div class="nav-profile">
<span id="nav-name">Student</span>
<img id="nav-avatar">
</div>

</nav>

<main>

<header style="margin-bottom:2rem">
<h1 id="greeting">WELCOME BACK</h1>
<p id="date-sub" style="color:var(--peach)"></p>
</header>

<div class="metrics-row">

<div class="m-card">
<h4>OVERALL</h4>
<span id="m-overall" class="value">--</span>
</div>

<div class="m-card">
<h4>SAFE BUNKS</h4>
<span id="m-bunks" class="value">--</span>
</div>

<div class="m-card">
<h4>DANGER</h4>
<span id="m-danger" class="value">--</span>
</div>

<div class="m-card">
<h4>SUBJECTS</h4>
<span id="m-total" class="value">--</span>
</div>

</div>

<div class="grid-layout">

<section>

<div class="card">
<h3>Subject Tracker</h3>
<div id="subjects-list"></div>
</div>

<div id="verdict-box" class="card">
<div id="verdict-score">--</div>
<p id="verdict-text"></p>
</div>

</section>

<aside>

<div class="card profile-header">
<img id="profile-av">
<h3 id="profile-n"></h3>

<div style="display:flex;justify-content:space-around;margin-top:1rem">
<div><div id="pc-overall">--</div><small>Avg</small></div>
<div><div id="pc-bunks">--</div><small>Bunks</small></div>
<div><div id="pc-danger">--</div><small>Low</small></div>
</div>

</div>

<div class="card">
<h3>Today's Classes</h3>
<div id="today-classes"></div>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alert-list"></div>
</div>

</aside>

</div>
</main>
</div>

<script>

const API='https://attendease-backend-wrag.onrender.com'

let currentUser=null
let streak=0

function init(){

const p=new URLSearchParams(window.location.search)

const uid=p.get('user_id')||localStorage.getItem('user_id')
const uname=p.get('name')||localStorage.getItem('user_name')
const uemail=p.get('email')||localStorage.getItem('user_email')

if(uid){

localStorage.setItem('user_id',uid)
localStorage.setItem('user_name',uname||'')
localStorage.setItem('user_email',uemail||'')

currentUser={
id:uid,
name:decodeURIComponent(uname||'Student'),
email:uemail
}

showApp()
updateStreak()

}else{

document.getElementById('auth-screen').style.display='flex'
document.getElementById('dashboard').style.display='none'

}

}

function showApp(){

document.getElementById('auth-screen').style.display='none'
document.getElementById('dashboard').style.display='block'

const name=currentUser.name
const first=name.split(' ')[0].toUpperCase()

document.getElementById('nav-name').textContent=first
document.getElementById('profile-n').textContent=name.toUpperCase()

const avatar=`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=FFA586&color=111320`

document.getElementById('nav-avatar').src=avatar
document.getElementById('profile-av').src=avatar

const h=new Date().getHours()
const greet=h<12?'GOOD MORNING':h<17?'GOOD AFTERNOON':'GOOD EVENING'

document.getElementById('greeting').textContent=greet+', '+first

document.getElementById('date-sub').textContent=new Date().toDateString()

loadDashboard()
loadVerdict()

}

function updateStreak(){

const today=new Date().toDateString()
const last=localStorage.getItem('streak_date')
const stored=parseInt(localStorage.getItem('streak')||'0')

if(last!==today){

streak=last===new Date(Date.now()-86400000).toDateString()?stored+1:1

localStorage.setItem('streak',streak)
localStorage.setItem('streak_date',today)

}else{

streak=stored

}

document.getElementById('streak-num').textContent='🔥 '+streak+' DAYS'

}

async function loadDashboard(){

try{

const res=await fetch(`${API}/dashboard/${currentUser.id}`)
const data=await res.json()

const bunks=data.subjects.reduce((s,x)=>s+x.can_bunk,0)

document.getElementById('m-overall').textContent=data.overall_percentage+'%'
document.getElementById('m-bunks').textContent=bunks
document.getElementById('m-danger').textContent=data.danger_count
document.getElementById('m-total').textContent=data.total_subjects

document.getElementById('pc-overall').textContent=data.overall_percentage+'%'
document.getElementById('pc-bunks').textContent=bunks
document.getElementById('pc-danger').textContent=data.danger_count

renderSubjects(data.subjects)
renderToday(data.subjects)

}catch(e){console.error(e)}

}

function renderSubjects(subjects){

const el=document.getElementById('subjects-list')

if(!subjects.length){

el.innerHTML='<p>No subjects yet</p>'
return

}

el.innerHTML=subjects.map(s=>{

const c=s.status==='safe'?'var(--safe)':s.status==='borderline'?'var(--peach)':'var(--crimson)'

return `<div class="subject-item">
<div style="display:flex;justify-content:space-between">
<span class="condensed">${s.name}</span>
<span class="badge">${s.status}</span>
</div>
<div class="progress-container">
<div class="progress-bar" style="width:${Math.min(s.percentage,100)}%;background:${c}"></div>
</div>
<small>${s.percentage}%</small>
</div>`

}).join('')

}

function renderToday(subjects){

const el=document.getElementById('today-classes')

const today=new Date().toISOString().split('T')[0]

el.innerHTML=subjects.map(s=>`

<div style="margin-bottom:1rem">

<div class="condensed">${s.name}</div>

<div class="class-btn-group">

<button class="btn-p" onclick="markAtt('${s.id}','${today}',this,'attended')">PRESENT</button>

<button class="btn-a" onclick="markAtt('${s.id}','${today}',this,'bunked')">ABSENT</button>

</div>

</div>

`).join('')

}

async function markAtt(sid,date,btn,status){

await fetch(`${API}/attendance`,{

method:'POST',

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

subject_id:sid,
date,
status

})

})

loadDashboard()

}

async function loadVerdict(){

try{

const res=await fetch(`${API}/ai/verdict/${currentUser.id}`)
const d=await res.json()

document.getElementById('verdict-score').textContent=d.overall_score
document.getElementById('verdict-text').textContent=d.overall_verdict+' '+d.advice

}catch(e){

document.getElementById('verdict-text').textContent='AI verdict unavailable.'

}

}

init()

</script>

</body>
</html>
