

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendEase</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>

:root{
--bg:#111320;
--card-bg:#1B1E2F;
--peach:#FFA586;
--crimson:#B51A2B;
--safe-green:#4ADE80;
--danger-red:#EF4444;
--text-dim:#94A3B8;
--border:rgba(255,165,134,0.15);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:white;
font-family:'Barlow',sans-serif;
}

h1,h2,h3,.condensed{
font-family:'Barlow Condensed',sans-serif;
font-weight:900;
text-transform:uppercase;
}

#auth-screen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.auth-card{
background:var(--card-bg);
padding:3rem;
border-radius:20px;
text-align:center;
border:1px solid var(--border);
}

.logo-large{
font-size:3rem;
color:var(--peach);
}

.google-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:white;
color:black;
text-decoration:none;
padding:12px 24px;
border-radius:10px;
margin-top:2rem;
}

#dashboard{display:none}

nav{
position:sticky;
top:0;
background:var(--card-bg);
padding:1rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
}

.nav-links{
display:flex;
gap:2rem;
}

.nav-links a{
color:var(--text-dim);
text-decoration:none;
}

.nav-links a.active{
color:var(--peach);
}

.nav-profile{
display:flex;
align-items:center;
gap:10px;
}

#nav-avatar{
width:36px;
height:36px;
border-radius:50%;
border:2px solid var(--peach);
}

main{
padding:2rem 5%;
max-width:1400px;
margin:auto;
}

.metrics-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:1.5rem;
margin-bottom:2rem;
}

.m-card{
background:var(--card-bg);
padding:1.5rem;
border-radius:14px;
border:1px solid var(--border);
}

.value{
font-size:2rem;
}

.grid-layout{
display:grid;
grid-template-columns:1fr 350px;
gap:2rem;
}

.card{
background:var(--card-bg);
padding:1.5rem;
border-radius:14px;
border:1px solid var(--border);
margin-bottom:1.5rem;
}

.subject-item{
padding:1rem;
background:rgba(255,255,255,0.03);
border-radius:10px;
margin-bottom:1rem;
}

.progress-container{
height:8px;
background:#2D314D;
border-radius:4px;
margin:8px 0;
overflow:hidden;
}

.progress-bar{
height:100%;
background:var(--peach);
}

.badge{
font-size:0.7rem;
padding:2px 6px;
border-radius:4px;
}

.class-btn-group{
display:flex;
gap:8px;
margin-top:10px;
}

.btn-p{
background:var(--peach);
border:none;
padding:8px;
border-radius:8px;
font-weight:bold;
flex:1;
cursor:pointer;
}

.btn-a{
background:transparent;
border:1px solid var(--crimson);
color:var(--crimson);
padding:8px;
border-radius:8px;
flex:1;
cursor:pointer;
}

.profile-card{text-align:center}

#profile-av{
width:80px;
height:80px;
border-radius:50%;
border:3px solid var(--peach);
margin-bottom:10px;
}

.profile-stats{
display:flex;
justify-content:space-between;
margin-top:1rem;
}

#streak-num{
font-size:2rem;
text-align:center;
margin-bottom:10px;
}

</style>

</head>

<body>

<section id="auth-screen">
<div class="auth-card">
<h1 class="logo-large">AttendEase</h1>
<p style="color:var(--text-dim)">Master your presence</p>

<a href="https://attendease-backend-wrag.onrender.com/auth/google" class="google-btn">
<img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
Continue with Google
</a>

</div>
</section>

<div id="dashboard">

<nav>

<h2 style="color:var(--peach)">AttendEase</h2>

<div class="nav-links condensed">
<a class="active">Dashboard</a>
<a>Subjects</a>
</div>

<div class="nav-profile">
<span id="nav-name">Student</span>
<img id="nav-avatar">
</div>

</nav>

<main>

<header style="margin-bottom:2rem">
<h1 id="greeting">WELCOME</h1>
<p id="date-sub"></p>
</header>

<div class="metrics-row">

<div class="m-card">
<h4>OVERALL</h4>
<span id="m-overall" class="value">--</span>
</div>

<div class="m-card">
<h4>BUNKS</h4>
<span id="m-bunks" class="value">--</span>
</div>

<div class="m-card">
<h4>DANGER</h4>
<span id="m-danger" class="value">--</span>
</div>

<div class="m-card">
<h4>SUBJECTS</h4>
<span id="m-total" class="value">--</span>
</div>

</div>

<div class="grid-layout">

<section>

<div class="card">
<h3>Subject Tracker</h3>
<div id="subjects-list"></div>
</div>

<div id="verdict-box" class="card">
<div id="verdict-score">--</div>
<p id="verdict-text"></p>
</div>

</section>

<aside>

<div class="card profile-card">
<img id="profile-av">
<h3 id="profile-n"></h3>

<div class="profile-stats condensed">

<div>
<span id="pc-overall">--</span>
<br>
<small>AVG</small>
</div>

<div>
<span id="pc-bunks">--</span>
<br>
<small>Bunks</small>
</div>

<div>
<span id="pc-danger">--</span>
<br>
<small>Low</small>
</div>

</div>

</div>

<div class="card">
<h3>Tracking Streak</h3>
<div id="streak-num">🔥 0 DAYS</div>
</div>

<div class="card">
<h3>Today's Classes</h3>
<div id="today-classes"></div>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alert-list"></div>
</div>

</aside>

</div>

</main>
</div>

<script>
const API='https://attendease-backend-wrag.onrender.com'
let currentUser=null
let streak=0

function init(){

const p=new URLSearchParams(window.location.search)

const uid=p.get('user_id')||localStorage.getItem('user_id')
const uname=p.get('name')||localStorage.getItem('user_name')
const uemail=p.get('email')||localStorage.getItem('user_email')

if(uid){

localStorage.setItem('user_id',uid)
localStorage.setItem('user_name',uname||'')
localStorage.setItem('user_email',uemail||'')

currentUser={
id:uid,
name:decodeURIComponent(uname||'Student'),
email:uemail
}

showApp()
updateStreak()

}

}

function showApp(){

document.getElementById('auth-screen').style.display='none'
document.getElementById('dashboard').style.display='block'

const name=currentUser.name
const first=name.split(' ')[0]

document.getElementById('nav-name').textContent=first
document.getElementById('profile-n').textContent=name

const avatar=`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=FFA586&color=111320`

document.getElementById('nav-avatar').src=avatar
document.getElementById('profile-av').src=avatar

document.getElementById('greeting').textContent="WELCOME "+first
document.getElementById('date-sub').textContent=new Date().toDateString()

loadDashboard()
loadVerdict()

}

function updateStreak(){

const today=new Date().toDateString()
const last=localStorage.getItem('streak_date')
const stored=parseInt(localStorage.getItem('streak')||'0')

if(last!==today){

streak=last===new Date(Date.now()-86400000).toDateString()?stored+1:1

localStorage.setItem('streak',streak)
localStorage.setItem('streak_date',today)

}else{

streak=stored

}

document.getElementById('streak-num').textContent=`🔥 ${streak} DAYS`

}

async function loadDashboard(){

const res=await fetch(`${API}/dashboard/${currentUser.id}`)
const data=await res.json()

const bunks=data.subjects.reduce((s,x)=>s+x.can_bunk,0)

document.getElementById('m-overall').textContent=data.overall_percentage+"%"
document.getElementById('m-bunks').textContent=bunks
document.getElementById('m-danger').textContent=data.danger_count
document.getElementById('m-total').textContent=data.total_subjects

document.getElementById('pc-overall').textContent=data.overall_percentage+"%"
document.getElementById('pc-bunks').textContent=bunks
document.getElementById('pc-danger').textContent=data.danger_count

renderSubjects(data.subjects)
renderToday(data.subjects)

}

function renderSubjects(subjects){

const el=document.getElementById('subjects-list')

el.innerHTML=subjects.map(s=>{

const color=s.status==='safe'?'var(--safe-green)':'var(--danger-red)'

return `
<div class="subject-item">

<div style="display:flex;justify-content:space-between">

<span class="condensed">${s.name}</span>

<span class="badge">${s.status}</span>

</div>

<div class="progress-container">

<div class="progress-bar" style="width:${Math.min(s.percentage,100)}%;background:${color}"></div>

</div>

<small>${s.percentage}% attendance</small>

</div>
`

}).join('')

}

function renderToday(subjects){

const el=document.getElementById('today-classes')

const today=new Date().toISOString().split('T')[0]

el.innerHTML=subjects.map(s=>`

<div style="margin-bottom:1rem">

<div class="condensed">${s.name}</div>

<div class="class-btn-group">

<button class="btn-p" onclick="markAtt('${s.id}','${today}','attended')">PRESENT</button>

<button class="btn-a" onclick="markAtt('${s.id}','${today}','bunked')">ABSENT</button>

</div>

</div>

`).join('')

}

async function markAtt(subject_id,date,status){

await fetch(`${API}/attendance`,{

method:'POST',

headers:{'Content-Type':'application/json'},

body:JSON.stringify({subject_id,date,status})

})

loadDashboard()

}

async function loadVerdict(){

try{

const res=await fetch(`${API}/ai/verdict/${currentUser.id}`)
const d=await res.json()

document.getElementById('verdict-score').textContent=d.overall_score
document.getElementById('verdict-text').textContent=d.overall_verdict+" "+d.advice

}catch{

document.getElementById('verdict-text').textContent='AI verdict unavailable'

}

}

init()
</script>

</body>
</html>
